<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Fitness App</title>
<style>
body{font-family:Arial;background:#0b0f1a;color:white;margin:0}
.container{padding:20px}
input,button{width:100%;padding:12px;margin:10px 0;border-radius:8px;border:none}
button{background:#00c853;color:white;font-weight:bold}
.hidden{display:none}
.nav{display:flex;gap:10px;margin-top:20px}
.nav button{flex:1;background:#1e2a3a}
.card{background:#111827;padding:20px;border-radius:10px;margin-top:20px}
</style>
</head>
<body><div class="container"><!-- LOGIN / REGISTER --><div id="auth">
<h2>Join Elite Fitness</h2>
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="weight" placeholder="Weight (kg)">
<input id="height" placeholder="Height (cm)">
<button onclick="login()">Start Free Plan</button>
</div><!-- DASHBOARD --><div id="dashboard" class="hidden">
<h2>Welcome <span id="userName"></span></h2><div class="nav">
<button onclick="showPage('workout')">Workout</button>
<button onclick="showPage('diet')">Diet</button>
<button onclick="showPage('monitor')">Progress</button>
<button onclick="showPage('profile')">Profile</button>
</div><!-- WORKOUT --><div id="workout" class="card">
<h3>Workout Plan</h3>
<p id="workoutPlan"></p>
</div><!-- DIET --><div id="diet" class="card hidden">
<h3>Diet Plan</h3>
<p id="dietPlan"></p>
</div><!-- MONITOR --><div id="monitor" class="card hidden">
<h3>Progress</h3>
<p>Track your weight weekly.</p>
</div><!-- PROFILE --><div id="profile" class="card hidden">
<h3>Your Info</h3>
<p id="profileData"></p>
<button onclick="upgrade()">Upgrade to Premium ₹499</button>
</div></div></div><script>
let user={};

function login(){
user.name=document.getElementById('name').value;
user.email=document.getElementById('email').value;
user.weight=parseInt(document.getElementById('weight').value);
user.height=parseInt(document.getElementById('height').value);

if(!user.name||!user.email){alert('Fill details');return;}

document.getElementById('auth').classList.add('hidden');
document.getElementById('dashboard').classList.remove('hidden');
document.getElementById('userName').innerText=user.name;

// simple logic
if(user.weight>80){
document.getElementById('workoutPlan').innerText='Fat Loss Plan: Cardio + HIIT';
document.getElementById('dietPlan').innerText='Low carb diet + protein';
}else{
document.getElementById('workoutPlan').innerText='Muscle Gain Plan: Strength training';
document.getElementById('dietPlan').innerText='High protein + calorie surplus';
}

// profile
 document.getElementById('profileData').innerText=
 'Name: '+user.name+' | Weight: '+user.weight+'kg | Height: '+user.height+'cm';
}

function showPage(page){
document.getElementById('workout').classList.add('hidden');
document.getElementById('diet').classList.add('hidden');
document.getElementById('monitor').classList.add('hidden');
document.getElementById('profile').classList.add('hidden');

document.getElementById(page).classList.remove('hidden');
}

function upgrade(){
let upi="upi://pay?pa=9080985296@ybl&pn=EliteFitness&am=499&cu=INR";
window.location.href=upi;
}
</script></body>
</html>
