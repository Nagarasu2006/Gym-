<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naga Store</title>
<style>
body{margin:0;font-family:Arial;background:#f1f3f6}
header{background:#2874f0;color:white;padding:15px;display:flex;justify-content:space-between}
header input{width:50%;padding:8px;border-radius:5px;border:none}
.container{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px}
.card{background:white;padding:10px;border-radius:8px;text-align:center}
.card img{width:100%;height:120px;object-fit:cover}
button{padding:10px;background:#fb641b;color:white;border:none;border-radius:5px;margin-top:5px}
.cart{position:fixed;bottom:10px;right:10px;background:#2874f0;color:white;padding:15px;border-radius:50%}
#cartPage{display:none;padding:20px}
</style>
</head>
<body><header>
<h2>Naga Store</h2>
<input type="text" placeholder="Search products...">
</header><div id="home" class="container"></div><div id="cartPage">
<h2>Your Cart</h2>
<div id="cartItems"></div>
<h3 id="total"></h3>
<button onclick="payNow()">Pay Now</button>
</div><div class="cart" onclick="openCart()">🛒</div><script>
let products=[
{name:'Shoes',price:999,img:'https://images.unsplash.com/photo-1542291026-7eec264c27ff'},
{name:'Watch',price:1999,img:'https://images.unsplash.com/photo-1519741497674-611481863552'},
{name:'Phone',price:15000,img:'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9'},
{name:'Headphones',price:1299,img:'https://images.unsplash.com/photo-1518441902113-cdf8b7e6d92c'}
];

let cart=[];

function loadProducts(){
let html='';
products.forEach((p,i)=>{
html+=`<div class='card'>
<img src='${p.img}'>
<h4>${p.name}</h4>
<p>₹${p.price}</p>
<button onclick='addToCart(${i})'>Add to Cart</button>
</div>`;
});
document.getElementById('home').innerHTML=html;
}

function addToCart(i){
cart.push(products[i]);
alert('Added to cart');
}

function openCart(){
document.getElementById('home').style.display='none';
document.getElementById('cartPage').style.display='block';

let html='';
let total=0;
cart.forEach(p=>{
html+=`<p>${p.name} - ₹${p.price}</p>`;
total+=p.price;
});

document.getElementById('cartItems').innerHTML=html;
document.getElementById('total').innerText='Total: ₹'+total;
}

function payNow(){
let upi="upi://pay?pa=9080985296@ybl&pn=NagaStore&am=100&cu=INR";
window.location.href=upi;
}

loadProducts();
</script></body>
</html>
