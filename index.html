<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IronPeak Gym</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#0a0a0a;
  color:#fff;
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 50px;
  background:#000;
  position:sticky;
  top:0;
}

nav h1{
  color:#ff5a00;
}

nav ul{
  display:flex;
  gap:20px;
  list-style:none;
}

nav a{
  color:#fff;
  text-decoration:none;
}

.btn{
  background:#ff5a00;
  padding:10px 20px;
  color:#fff;
  border:none;
  cursor:pointer;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  padding:50px;
}

.hero h1{
  font-size:80px;
  font-family:'Anton';
}

.orange{
  color:#ff5a00;
}

/* STATS */
.stats{
  display:flex;
  justify-content:space-around;
  padding:40px;
  border-top:1px solid #333;
}

.stats div{
  text-align:center;
}

/* PROGRAMS */
.programs{
  padding:50px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  border:1px solid #222;
  padding:20px;
  transition:0.3s;
}

.card:hover{
  border-color:#ff5a00;
}

/* PRICING */
.pricing{
  padding:50px;
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.price-card{
  flex:1;
  border:1px solid #222;
  padding:20px;
}

.highlight{
  border:2px solid #ff5a00;
}

/* CONTACT */
.contact{
  padding:50px;
  display:flex;
  flex-wrap:wrap;
  gap:20px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin:10px 0;
  background:#111;
  border:1px solid #333;
  color:#fff;
}

footer{
  text-align:center;
  padding:20px;
  background:#000;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <h1>IRONPEAK</h1>
  <ul>
    <li><a href="#">Programs</a></li>
    <li><a href="#">Pricing</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
  <button class="btn">Join Now</button>
</nav>

<!-- HERO -->
<section class="hero">
  <div>
    <h1>BUILD <span class="orange">BEYOND</span> LIMITS</h1>
    <button class="btn" onclick="scrollToForm()">Start Free Trial</button>
  </div>
</section>

<!-- STATS -->
<section class="stats">
  <div><h2>300+</h2><p>Members</p></div>
  <div><h2>8</h2><p>Trainers</p></div>
  <div><h2>6+</h2><p>Years</p></div>
  <div><h2>6</h2><p>Programs</p></div>
</section>

<!-- PROGRAMS -->
<section class="programs">
  <h2>Our Programs</h2>
  <div class="grid">
    <div class="card">Strength Training</div>
    <div class="card">Boxing</div>
    <div class="card">HIIT</div>
    <div class="card">Yoga</div>
    <div class="card">Personal Training</div>
    <div class="card">Bodybuilding</div>
  </div>
</section>

<!-- PRICING -->
<section class="pricing">
  <div class="price-card">
    <h3>Starter</h3>
    <h1>₹999</h1>
  </div>

  <div class="price-card highlight">
    <h3>Pro</h3>
    <h1>₹1799</h1>
  </div>

  <div class="price-card">
    <h3>Elite</h3>
    <h1>₹3499</h1>
  </div>
</section>

<!-- CONTACT -->
<section class="contact" id="form">
  <div style="flex:1">
    <h2>Join Today</h2>
    <input type="text" id="name" placeholder="Your Name">
    <input type="tel" id="phone" placeholder="Phone">
    <textarea id="goal" placeholder="Your Goal"></textarea>
    <button class="btn" onclick="sendWhatsApp()">Send & Get Trial</button>
  </div>
</section>

<footer>
  <p>© 2026 IronPeak Gym</p>
</footer>

<script>
function scrollToForm(){
  document.getElementById("form").scrollIntoView({behavior:"smooth"});
}

// WhatsApp integration
function sendWhatsApp(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let goal = document.getElementById("goal").value;

  let message = `Hi, I'm ${name}%0APhone: ${phone}%0AGoal: ${goal}`;

  window.open(`https://wa.me/919XXXXXXXXX?text=${message}`, "_blank");
}
</script>

</body>
</html>
