<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Fitness Gym</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0b0f1a;
color:white;
}

/* HERO */
.hero{
background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
url('https://images.unsplash.com/photo-1554284126-aa88f22d8b74');
background-size:cover;
padding:100px 20px;
text-align:center;
}

.hero h1{
font-size:42px;
color:#00ffae;
}

.hero p{
margin:15px 0;
color:#ccc;
}

/* SECTION */
.section{
padding:50px 20px;
text-align:center;
}

/* FORM CARD */
.card{
max-width:400px;
margin:auto;
background:#111827;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

input, select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
outline:none;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#00ffae,#007bff);
color:white;
font-size:16px;
cursor:pointer;
}

/* PLAN */
.plan{
margin-top:20px;
padding:15px;
background:#1f2937;
border-radius:10px;
}

.highlight{
color:#00ffae;
font-size:28px;
font-weight:bold;
}

/* RESULT */
.result{
margin-top:20px;
padding:15px;
background:#111827;
border-radius:10px;
display:none;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
<h1>Transform Your Body 💪</h1>
<p>Personalized workout & fitness plans just for you</p>
</section>

<!-- FORM -->
<section class="section">
<div class="card">

<h2>Start Your Fitness Journey</h2>

<input type="text" id="name" placeholder="Your Name">
<input type="number" id="age" placeholder="Age">
<input type="number" id="height" placeholder="Height (cm)">
<input type="number" id="weight" placeholder="Weight (kg)">

<select id="goal">
<option value="">Select Goal</option>
<option value="weightloss">Weight Loss</option>
<option value="muscle">Muscle Gain</option>
<option value="fit">General Fitness</option>
</select>

<div class="plan">
<h3>Basic Plan</h3>
<p class="highlight">₹499 / Month</p>
<p>✔ Workout Plan<br>✔ Diet Suggestion</p>
</div>

<div class="plan">
<h3>Premium Plan 🚀</h3>
<p class="highlight">₹999 / Month</p>
<p>✔ Personal Trainer<br>✔ Weekly Tracking<br>✔ Online Coaching</p>
</div>

<button onclick="generatePlan()">Get My Plan</button>

<div class="result" id="resultBox"></div>

</div>
</section>

<script>
function generatePlan(){

let name = document.getElementById("name").value;
let height = document.getElementById("height").value;
let weight = document.getElementById("weight").value;
let goal = document.getElementById("goal").value;

if(!name || !height || !weight || !goal){
alert("Fill all details");
return;
}

let bmi = weight / ((height/100)*(height/100));
let plan = "";

if(goal=="weightloss"){
plan = "🏃 Cardio 30 mins + Fat burn workout + Calorie deficit diet";
}
else if(goal=="muscle"){
plan = "🏋️ Heavy weight training + High protein diet";
}
else{
plan = "🤸 Full body workout + Balanced diet";
}

document.getElementById("resultBox").style.display="block";

document.getElementById("resultBox").innerHTML =
"🔥 Hello "+name+"<br><br>" +
"Your BMI: "+bmi.toFixed(1)+"<br><br>" +
"Recommended Plan:<br>"+plan +
"<br><br><b>Upgrade to Premium for personal coaching 🚀</b>";
}
</script>

</body>
</html>
